<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Live Studio Domino - Overlay</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="display" content="fullscreen">
    <link rel="manifest" href="/static/manifest.json">

    <style>
        /* CSS RESET para garantir que o celular use 100% da tela sem barras de rolagem */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #000; 
            color: #e1e1e6;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /* --- CAMADA 1 (FUNDO): AJUSTE DA WEBCAM SEM SUPER-ZOOM --- */
                /* --- CAMADA 1 (FUNDO): CÂMERA EM TELA CHEIA REAL --- */
        #webcam-fundo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100vw;   /* Força ocupar toda a largura do navegador */
            height: 100vh;  /* Força ocupar toda a altura do navegador */
            object-fit: cover; /* Estica eliminando as barras pretas laterais */
            background-color: #000;
            z-index: 1;
            transition: transform 0.3s ease;
        }
        /* --- CAMADA 2: CONTROLES DA CÂMERA EM CIMA --- */
        .painel-controles {
            position: absolute; 
            top: 15px; 
            right: 15px; 
            z-index: 100; /* Garante que fica clicável acima do vídeo */
            background: rgba(0, 0, 0, 0.75); 
            padding: 8px; 
            border-radius: 8px;
            display: flex;
            gap: 5px;
        }
        .painel-controles button {
            padding: 6px 12px; 
            color: white; 
            border: none; 
            border-radius: 4px; 
            cursor: pointer;
            font-weight: bold;
            font-size: 13px;
        }

        /* --- CAMADA 3: PLACAR FLUTUANTE COM DESTAQUE --- */
        .placar-container {
            position: absolute;
            top: 15px;
            left: 15px;
            /* Fundo escuro com opacidade maior e desfoque tipo vidro (backdrop-filter) */
            background-color: rgba(18, 18, 20, 0.85);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 10px;
            padding: 15px;
            width: 280px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            border-left: 5px solid #00b37e;
            z-index: 50; /* Flutua acima do vídeo */
        }
        
        .placar-titulo {
            color: #00b37e;
            font-size: 16px;
            font-weight: bold;
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 5px;
        }
        
        .jogador-linha {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 16px;
            font-weight: bold;
            /* Cor branca forte para dar total destaque aos nomes no fundo escuro */
            color: #ffffff; 
        }
        
        .detalhes-jogo {
            font-size: 12px;
            color: #c4c4cc; /* Cinza claro bem mais legível */
            margin-bottom: 8px;
            padding-bottom: 4px;
        }

        /* --- CAMADA 4: POPUPS DE ALERTAS --- */
        .caixa-alerta {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.95);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            z-index: 500; /* No topo absoluto */
            border: 3px solid #4834d4;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }
        .texto-alerta { 
            font-size: 22px; 
            color: #fff; 
            margin-top: 10px; 
            font-weight: bold; 
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <div class="painel-controles">
        <button onclick="alternarCamera()" style="background: #00b37e;">🎥 Alternar Câmera</button>
        <button onclick="rotacionarCamera()" style="background: #4834d4;">🔄 Girar 90°</button>
        <button onclick="ativarTelaCheia()" style="background: #ff9f43;">📺 Tela Cheia</button>
    </div>

    <video id="webcam-fundo" autoplay playsinline></video>

    <div class="placar-container">
        <div class="placar-titulo">📯 Placar da Partida</div>
        <div id="jogadores-lista">Carregando dados...</div>
    </div>

    <div id="alerta-presente" class="caixa-alerta">
        <video id="meme-video" width="320" playsinline>
            <source id="meme-src" src="" type="video/mp4">
        </video>
        <div id="meme-texto" class="texto-alerta"></div>
    </div>

    <div id="alerta-like" class="caixa-alerta">
        <video id="meme-like-video" width="320" playsinline>
            <source id="meme-like-src" src="" type="video/mp4">
        </video>
        <div id="meme-like-texto" class="texto-alerta"></div>
    </div>

    <script>
        let audioTTS = new Audio();
        let streamAtual = null;
        let posicaoCamera = "environment"; // "environment" = Traseira, "user" = Frontal
        let anguloRotacao = 0;

        async function iniciarCamera() {
            if (streamAtual) {
                streamAtual.getTracks().forEach(track => track.stop());
            }

            try {
                const restricoes = { 
                    video: { 
                        facingMode: posicaoCamera,
                        width: { ideal: 1280 }, 
                        height: { ideal: 720 } 
                    }, 
                    audio: false 
                };

                const stream = await navigator.mediaDevices.getUserMedia(restricoes);
                const videoFundo = document.getElementById('webcam-fundo');
                
                streamAtual = stream;
                videoFundo.srcObject = stream;
            } catch (err) {
                console.error("Erro ao acessar a Webcam: ", err);
                if(posicaoCamera === "environment") {
                    posicaoCamera = "user";
                    iniciarCamera();
                }
            }
        }

        function ativarTelaCheia() {
            const elemento = document.documentElement; // Pega a página inteira

            if (!document.fullscreenElement) {
                // Força entrar em tela cheia sumindo com todas as barras do Android
                if (elemento.requestFullscreen) {
                    elemento.requestFullscreen();
                } else if (elemento.mozRequestFullScreen) { // Especial para o Firefox antigo/específico
                    elemento.mozRequestFullScreen();
                } else if (elemento.webkitRequestFullscreen) {
                    elemento.webkitRequestFullscreen();
                } else if (elemento.msRequestFullscreen) {
                    elemento.msRequestFullscreen();
                }
            } else {
                // Se clicar de novo, ele sai do modo tela cheia
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        }

        function alternarCamera() {
            posicaoCamera = (posicaoCamera === "user") ? "environment" : "user";
            iniciarCamera();
        }

        function rotacionarCamera() {
            const videoFundo = document.getElementById('webcam-fundo');
            anguloRotacao = (anguloRotacao + 90) % 360;
            
            if (posicaoCamera === "user") {
                videoFundo.style.transform = `scaleX(-1) rotate(${anguloRotacao}deg)`;
            } else {
                videoFundo.style.transform = `rotate(${anguloRotacao}deg)`;
            }
        }

        async function puxarDadosFirebase() {
            try {
                const url = "https://firestore.googleapis.com/v1/projects/placar-domino/databases/(default)/documents/hardware/display";
                const response = await fetch(url);
                const data = await response.json();
                const campos = data.fields;

                let htmlGerado = "";
                for (let i = 1; i <= 4; i++) {
                    const nome = campos[`nome${i}`]?.stringValue || `Jogador ${i}`;
                    const points = campos[`jogador${i}`]?.integerValue || "0";
                    const lambretas = campos[`lambretas${i}`]?.integerValue || "0";
                    const raios = campos[`raios${i}`]?.integerValue || "0";

                    htmlGerado += `
                        <div class="jogador-linha">
                            <span><strong>${nome}</strong></span>
                            <span>${points} pts</span>
                        </div>
                        <div class="detalhes-jogo">⚡ Raios: ${raios} | 🛵 Lambretas: ${lambretas}</div>
                    `;
                }
                document.getElementById('jogadores-lista').innerHTML = htmlGerado;
            } catch (err) {
                console.error("Erro ao ler Firebase:", err);
            }
        }

        async function checarNovosAlertas() {
            try {
                const response = await fetch('/obter_alerta');
                const data = await response.json();

                if (data.reproduzir) {
                    if (data.tipo === "tts") {
                        audioTTS.src = "/audio?" + new Date().getTime();
                        audioTTS.play();
                    } 
                    else if (data.tipo === "gift") {
                        const box = document.getElementById('alerta-presente');
                        const video = document.getElementById('meme-video');
                        const videoSource = document.getElementById('meme-src');

                        document.getElementById('meme-texto').innerText = data.mensagem;
                        videoSource.src = "/static/EH_Nois.mp4";

                        box.style.borderColor = "#ff9f43";
                        box.style.display = "block";

                        video.load();
                        video.play().catch(e => console.log("Erro no vídeo:", e));

                        setTimeout(() => {
                            box.style.display = "none";
                            video.pause();
                        }, 10000);
                    } 
                    else if (data.tipo === "like") {
                        const box = document.getElementById('alerta-like');
                        const video = document.getElementById('meme-like-video');
                        const videoSource = document.getElementById('meme-like-src');

                        // CORREÇÃO 1: Usando o ID geral 'meme-texto' que está dentro de #alerta-like no seu HTML
                        document.getElementById('alerta-like').querySelector('.texto-alerta').innerText = data.mensagem;
                        videoSource.src = "/static/DInovo.mp4";

                        
                        videoSource.src = "/static/DInovo.mp4";

                        box.style.borderColor = "#ff007f";
                        box.style.display = "block";

                        video.load();
                        video.play().catch(e => console.log("Erro no vídeo:", e));

                        setTimeout(() => {
                            box.style.display = "none";
                            video.pause();
                        }, 13000);
                    }
                }
            } catch (err) { }
        }

        window.onload = () => {
            iniciarCamera();
            setInterval(puxarDadosFirebase, 4000);
            setInterval(checarNovosAlertas, 1000);
        };
    </script>
</body>
</html>
