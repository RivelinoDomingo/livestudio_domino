<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Studio Domino - Overlay</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/static/manifest.json">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #e1e1e6;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* =====================================================
           CÂMERA
           O Firefox já entrega o stream rotacionado (portrait),
           então não precisamos de nenhum transform no vídeo.
           Centralizamos com top/left 50% + translate para que
           funcione corretamente tanto fora quanto em tela cheia.
           object-fit: cover preenche o viewport sem barras pretas;
           width/height 100vw/100vh garantem cobertura total.
        ===================================================== */
        #webcam-fundo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            background: #000;
            z-index: 1;
        }

        /* =====================================================
           OVERLAY ROTACIONADO -90°
           Container que gira todo o conteúdo (placar, botões,
           alertas) para aparecer correto quando o celular está
           fisicamente deitado mas o browser está em portrait.

           Dimensões trocadas: width=100vh / height=100vw
           para o espaço interno parecer landscape para o usuário.
        ===================================================== */
        #overlay-rotacionado {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vh;   /* landscape percebida: largura = altura do viewport */
            height: 100vw;  /* landscape percebida: altura  = largura do viewport */
            transform: translate(-50%, -50%) rotate(90deg);
            transform-origin: center center;
            z-index: 50;
        }

        /* --- MENU FLUTUANTE --- */
        .menu-container {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .botao-menu-principal {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(18, 18, 20, 0.9);
            border: 2px solid #00b37e;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .painel-controles {
            display: none;
            flex-direction: column;
            background: rgba(18, 18, 20, 0.95);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 8px;
            gap: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .painel-controles button {
            padding: 8px 14px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-align: left;
            white-space: nowrap;
        }

        /* --- PLACAR --- */
        .placar-container {
            position: absolute;
            top: 5px;
            left: 10px;
            background-color: rgba(18, 18, 20, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 10px;
            padding: 12px;
            width: 160px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            border-left: 5px solid #00b37e;
        }

        .placar-titulo {
            color: #00b37e;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 3px;
        }

        /* --- LISTA DE DOADORES --- */
        #doadores-container {
            position: absolute;
            /* Abaixo do placar: top placar (15px) + altura média do placar + gap */
            top: 235px;
            left: 10px;
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .doador-card {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(18, 18, 20, 0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 4px 10px 4px 4px;
            border: 1px solid rgba(255, 179, 126, 0.3);
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .doador-posicao {
            font-size: 10px;
            color: #ff9f43;
            font-weight: bold;
            min-width: 14px;
            text-align: center;
        }

        .doador-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #ff9f43;
            background: #2e2e35;
            /* Fallback se imagem expirar */
            flex-shrink: 0;
        }

        .doador-avatar-fallback {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9f43, #ff6b35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            border: 1.5px solid #ff9f43;
        }

        .doador-nick {
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .jogador-item {
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            padding-bottom: 4px;
        }
        .jogador-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .jogador-linha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        .jogador-nome {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pontos-container { display: flex; gap: 4px; }

        .bloco-ponto {
            width: 14px;
            height: 10px;
            background-color: #2e2e35;
            transform: skewX(-15deg);
            border-radius: 1px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        .bloco-ponto.ativo {
            background-color: #ffca28;
            box-shadow: 0 0 8px rgba(255,202,40,0.6);
        }

        .detalhes-jogo { font-size: 11px; color: #a8a8b3; margin-top: 2px; }

        /* --- ALERTAS --- */
        /* Banner único — estilos principais são inline no HTML para clareza */
        #banner-alerta {
            /* Fundo escuro semitransparente apenas atrás do texto inferior */
            background: transparent;
        }

        /* --- MODAL RÁDIO --- */
        #modal-radio {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(18,18,20,0.97);
            border: 2px solid #00b37e;
            border-radius: 12px;
            padding: 18px;
            z-index: 600;
            min-width: 260px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }
        #modal-radio h3 {
            color: #00b37e;
            font-size: 13px;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        #modal-radio input[type=text] {
            width: 100%;
            padding: 8px 10px;
            background: #2e2e35;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }
        .radio-volume-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 11px;
            color: #a8a8b3;
        }
        .radio-volume-row input[type=range] {
            flex: 1;
            accent-color: #00b37e;
        }
        .modal-btns {
            display: flex;
            gap: 8px;
        }
        .modal-btns button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            color: #fff;
        }

        /* --- PAINEL DE DEBUG (canto inferior direito, discreto) --- */
        #debug-painel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.75);
            border: 1px solid #00ff88;
            border-radius: 6px;
            padding: 8px 10px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #00ff88;
            line-height: 1.6;
            display: none; /* começa oculto; abre pelo botão no menu */
            z-index: 200;
        }
        #debug-painel b { color: #fff; }
    </style>

    <script>
        // Registra o Service Worker para cache dos arquivos /static
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('[SW] Registrado:', reg.scope))
                    .catch(err => console.warn('[SW] Falha no registro:', err));
            });
        }
    </script>
</head>
<body>

    <!-- CÂMERA: fora do overlay, sem nenhum tratamento -->
    <video id="webcam-fundo" autoplay playsinline></video>

    <!-- OVERLAY: todo o conteúdo visual rotacionado -90° -->
    <div id="overlay-rotacionado">

        <!-- Menu de controles -->
        <div class="menu-container">
            <button class="botao-menu-principal" onclick="alternarMenuControles()">⚙️</button>
            <div id="menu-paineis" class="painel-controles">
                <button onclick="alternarCamera()"   style="background:#00b37e;">🎥 Alternar Câmera</button>
                <button onclick="ativarTelaCheia()"  style="background:#ff9f43;">📺 Tela Cheia</button>
                <button onclick="abrirModalRadio()"  style="background:#7c3aed;">📻 Rádio Web</button>
                <button onclick="alternarDebug()"    style="background:#444;">🔍 Debug Info</button>
            </div>
        </div>

        <!-- Placar -->
        <div class="placar-container" id="placar-container">
            <div class="placar-titulo">📯 Placar</div>
            <div id="jogadores-lista">Carregando dados...</div>
        </div>

        <!-- Lista dos últimos doadores -->
        <div id="doadores-container"></div>

        <!-- Banner único de alertas (gift + like) com fila e prioridade -->
        <div id="banner-alerta" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; z-index:500; pointer-events:none;">
            <!-- Vídeo centralizado -->
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-55%); text-align:center;">
                <video id="meme-video" playsinline
                       style="max-width:84vh; max-height:52vw; border-radius:10px; display:block;"></video>
            </div>
            <!-- Texto ancorado na parte inferior -->
            <div id="banner-texto-container" style="
                position:absolute; bottom:18px; left:0; width:100%;
                text-align:center; padding:0 20px;">
                <!-- Tipo do alerta (ícone) -->
                <div id="banner-icone" style="font-size:20px; margin-bottom:4px;"></div>
                <!-- Mensagem principal (nome do doador) -->
                <div id="banner-texto" style="
                    font-size:20px; font-weight:bold; color:#fff;
                    text-shadow:2px 2px 6px rgba(0,0,0,0.9);
                    background:rgba(0,0,0,0.55); border-radius:8px;
                    padding:6px 14px; display:inline-block;
                    max-width:90%; word-break:break-word;"></div>
                <!-- Fila de próximos (aparece quando há mais de 1 pendente) -->
                <div id="banner-fila-info" style="
                    font-size:11px; color:#ccc; margin-top:4px;
                    opacity:0.8;"></div>
            </div>
        </div>

        <!-- Modal Rádio -->
        <div id="modal-radio">
            <h3>📻 Rádio Web</h3>
            <label style="font-size:11px;color:#a8a8b3;">Endereço do stream</label>
            <input type="text" id="radio-url-input" placeholder="http://192.168.1.x:8080/stream">

            <div class="radio-volume-row">
                <span>🎵 Rádio</span>
                <input type="range" id="vol-radio" min="0" max="1" step="0.05" value="0.7"
                       oninput="ajustarVolume('radio', this.value)">
                <span id="vol-radio-val">70%</span>
            </div>
            <div class="radio-volume-row">
                <span>🔊 Alertas</span>
                <input type="range" id="vol-alertas" min="0" max="1" step="0.05" value="1"
                       oninput="ajustarVolume('alertas', this.value)">
                <span id="vol-alertas-val">100%</span>
            </div>

            <div class="modal-btns">
                <button id="btn-ligar-radio" onclick="ligarRadio()"
                        style="background:#7c3aed;">▶ Ligar</button>
                <button onclick="fecharModalRadio()"
                        style="background:#444;">✕ Fechar</button>
            </div>
        </div>

        <!-- Painel de debug (oculto por padrão) -->
        <div id="debug-painel">
            <b>📷 DEBUG</b><br>
            Viewport: <span id="d-viewport">—</span><br>
            Stream: <span id="d-stream-res">—</span>  ratio: <span id="d-stream-ratio">—</span><br>
            video WxH: <span id="d-vid-w">—</span> x <span id="d-vid-h">—</span><br>
            Orientação: <span id="d-vid-orient">—</span><br>
            facingMode: <span id="d-facing">—</span><br>
            resizeMode: <span id="d-resize">—</span><br>
            screen.orient: <span id="d-screen-orient">—</span><br>
            DPR: <span id="d-dpr">—</span>
        </div>

    </div><!-- fim #overlay-rotacionado -->

    <script>
        let audioTTS     = new Audio();
        let streamAtual  = null;
        let facingAtual  = "environment";
        let debugVisivel = false;

        // ── RÁDIO WEB ─────────────────────────────────────────────
        const audioRadio = new Audio();
        audioRadio.loop  = false; // stream contínuo, não precisa de loop
        let radioAtiva   = false;
        let volRadio     = 0.7;   // volume padrão da rádio
        let volAlertas   = 1.0;   // volume padrão dos alertas/TTS

        function abrirModalRadio() {
            // Fecha o menu de controles
            document.getElementById('menu-paineis').style.display = 'none';
            const modal = document.getElementById('modal-radio');
            // Pré-preenche com o valor salvo
            const salvo = localStorage.getItem('radio_url') || '';
            document.getElementById('radio-url-input').value = salvo;
            modal.style.display = 'block';
        }

        function fecharModalRadio() {
            document.getElementById('modal-radio').style.display = 'none';
        }

        function ligarRadio() {
            const input = document.getElementById('radio-url-input').value.trim();
            if (!input) return;

            // Salva para próxima vez
            localStorage.setItem('radio_url', input);

            if (radioAtiva) {
                // Desliga
                audioRadio.pause();
                audioRadio.src = '';
                radioAtiva = false;
                document.getElementById('btn-ligar-radio').textContent = '▶ Ligar';
                document.getElementById('btn-ligar-radio').style.background = '#7c3aed';
            } else {
                // Normaliza a URL: garante http:// e adiciona /stream se não tiver caminho
                let urlFinal = input.trim();
                if (!urlFinal.startsWith('http')) urlFinal = 'http://' + urlFinal;
                // Se a URL for só host:porta sem caminho, aponta para /stream
                try {
                    const u = new URL(urlFinal);
                    if (u.pathname === '/' || u.pathname === '') u.pathname = '/stream';
                    urlFinal = u.toString();
                } catch(e) {}
                const urlProxy = '/radio-proxy?url=' + encodeURIComponent(urlFinal);
                audioRadio.src = urlProxy;
                audioRadio.volume = volRadio;
                audioRadio.play().catch(e => console.warn('Rádio:', e));
                radioAtiva = true;
                document.getElementById('btn-ligar-radio').textContent = '⏹ Parar';
                document.getElementById('btn-ligar-radio').style.background = '#e53e3e';
            }
        }

        function ajustarVolume(alvo, valor) {
            const pct = Math.round(valor * 100) + '%';
            if (alvo === 'radio') {
                volRadio = parseFloat(valor);
                audioRadio.volume = volRadio;
                document.getElementById('vol-radio-val').textContent = pct;
            } else {
                volAlertas = parseFloat(valor);
                audioTTS.volume = volAlertas;
                document.getElementById('vol-alertas-val').textContent = pct;
            }
        }

        // Aplica ducking na rádio durante alertas e restaura depois
        function duckRadio(duracao) {
            if (!radioAtiva) return;
            const volOriginal = volRadio;
            audioRadio.volume = Math.min(volOriginal * 0.15, 0.1); // abaixa para ~15%
            setTimeout(() => {
                if (radioAtiva) audioRadio.volume = volOriginal;
            }, duracao);
        }

        // ── CÂMERA ────────────────────────────────────────────────
        // Pede alta resolução MAS com a proporção exata do viewport
        // para evitar que o Firefox precise fazer crop-and-scale.
        // Viewport portrait ≈ 9:16 → câmera landscape → 16:9
        // Calculamos o aspectRatio real do viewport em landscape (W/H invertido)
        // e passamos como constraint; assim o stream chega já na proporção certa.
        async function iniciarCamera() {
            if (streamAtual) streamAtual.getTracks().forEach(t => t.stop());

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: facingAtual,
                        // Alta resolução; browser entrega o melhor que conseguir
                        width:  { ideal: 2440 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                streamAtual = stream;
                document.getElementById('webcam-fundo').srcObject = stream;

                // Atualiza debug com os settings reais negociados
                const track    = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                document.getElementById('d-stream-res').textContent =
                    `${settings.width || '?'} x ${settings.height || '?'}`;
                document.getElementById('d-stream-ratio').textContent =
                    settings.aspectRatio ? settings.aspectRatio.toFixed(3) : '?';
                document.getElementById('d-facing').textContent =
                    settings.facingMode || '?';
                document.getElementById('d-resize').textContent =
                    settings.resizeMode || 'n/a';

                document.getElementById('webcam-fundo').onloadedmetadata = atualizarDebugVideo;

            } catch (err) {
                console.error("Erro na câmera:", err);
                // Tenta câmera frontal como fallback
                if (facingAtual === "environment") {
                    facingAtual = "user";
                    iniciarCamera();
                }
            }
        }

        // ── CONTROLES ─────────────────────────────────────────────
        function alternarMenuControles() {
            const p = document.getElementById('menu-paineis');
            const q = document.getElementById('debug-painel');
            p.style.display = p.style.display === "flex" ? "none" : "flex";
            if (p.style.display === "none" && q.style.display === "block") {
                debugVisivel = !debugVisivel;
                document.getElementById('debug-painel').style.display = "none";
            }

        }

        function alternarCamera() {
            facingAtual = facingAtual === "user" ? "environment" : "user";
            iniciarCamera();
        }

        function ativarTelaCheia() {
            const el = document.documentElement;
            if (!document.fullscreenElement) {
                (el.requestFullscreen || el.mozRequestFullScreen ||
                 el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            }
        }

        function alternarDebug() {
            debugVisivel = !debugVisivel;
            document.getElementById('debug-painel').style.display =
                debugVisivel ? "block" : "none";
        }

        // ── DEBUG ─────────────────────────────────────────────────
        function atualizarDebugVideo() {
            const vid = document.getElementById('webcam-fundo');
            const vw = vid.videoWidth, vh = vid.videoHeight;
            document.getElementById('d-vid-w').textContent = vw || '…';
            document.getElementById('d-vid-h').textContent = vh || '…';
            if (vw && vh) {
                const r = (vw / vh).toFixed(3);
                document.getElementById('d-vid-orient').textContent =
                    vw > vh ? `LANDSCAPE (${r})` : `PORTRAIT (${r})`;
            }
        }

        function atualizarDebugViewport() {
            document.getElementById('d-viewport').textContent =
                `${window.innerWidth} x ${window.innerHeight}`;
            document.getElementById('d-screen-orient').textContent =
                screen.orientation?.type || '?';
            document.getElementById('d-dpr').textContent =
                window.devicePixelRatio.toFixed(2);
        }

        setInterval(() => {
            if (debugVisivel) {
                atualizarDebugViewport();
                atualizarDebugVideo();
            }
        }, 1000);

        // ── LISTA DE DOADORES ─────────────────────────────────────
        // Guarda até 3 doadores: [{ nickname, avatar_url }]
        // 1° = mais recente (topo), 3° = mais antigo (base)
        const listaDoadores = [];

        function atualizarDoadores(nickname, avatar_url) {
            // Remove se já existia (vai para o topo)
            const idx = listaDoadores.findIndex(d => d.nickname === nickname);
            if (idx !== -1) listaDoadores.splice(idx, 1);

            // Insere no início (1° lugar = mais recente)
            listaDoadores.unshift({ nickname, avatar_url });

            // Mantém apenas os 3 últimos
            if (listaDoadores.length > 3) listaDoadores.pop();

            renderizarDoadores();
        }

        function renderizarDoadores() {
            const container = document.getElementById('doadores-container');
            // console.log('[DOADORES] renderizando', listaDoadores.length, 'itens | container:', !!container);
            if (!container) return;
            const posEmoji = ['🥇', '🥈', '🥉'];

            container.innerHTML = listaDoadores.map((d, i) => {
                const avatarHtml = d.avatar_url
                    ? `<img class="doador-avatar"
                            src="${d.avatar_url}"
                            alt="${d.nickname}"
                            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                       <div class="doador-avatar-fallback" style="display:none;">🎁</div>`
                    : `<div class="doador-avatar-fallback">🎁</div>`;

                return `
                    <div class="doador-card">
                        <span class="doador-posicao">${posEmoji[i]}</span>
                        ${avatarHtml}
                        <span class="doador-nick">${d.nickname}</span>
                    </div>`;
            }).join('');
        }

        // ── PLACAR (FIREBASE) ─────────────────────────────────────
        function gerarBlocosPontos(pontos) {
            const qtd = Math.min(Math.max(parseInt(pontos) || 0, 0), 4);
            let html = '<div class="pontos-container">';
            for (let i = 1; i <= 4; i++)
                html += `<div class="bloco-ponto ${i <= qtd ? 'ativo' : ''}"></div>`;
            return html + '</div>';
        }

        async function puxarDadosFirebase() {
            try {
                const url = "https://firestore.googleapis.com/v1/projects/placar-domino/databases/(default)/documents/hardware/display";
                const data = await (await fetch(url)).json();
                const campos = data.fields;
                let html = "";
                for (let i = 1; i <= 4; i++) {
                    const nome     = campos[`nome${i}`]?.stringValue    || `Jogador ${i}`;
                    const points   = parseInt(campos[`jogador${i}`]?.integerValue) || 0;
                    const lambretas = campos[`lambretas${i}`]?.integerValue || "0";
                    const raios    = campos[`raios${i}`]?.integerValue    || "0";
                    html += `
                        <div class="jogador-item">
                            <div class="jogador-linha">
                                <span class="jogador-nome"><strong>${nome}</strong></span>
                                ${gerarBlocosPontos(points)}
                            </div>
                            <div class="detalhes-jogo">⚡ R: ${raios} | 🛵 L: ${lambretas}</div>
                        </div>`;
                }
                document.getElementById('jogadores-lista').innerHTML = html;
            } catch (err) { console.error("Erro Firebase:", err); }
        }

        // ── FILA DE ALERTAS COM PRIORIDADE ──────────────────────
        //
        // Estrutura de cada item: { tipo, mensagem, prioridade }
        //   prioridade 1 = gift (máxima)
        //   prioridade 2 = like
        //
        // Comportamento:
        //   - Se banner estiver livre → exibe imediatamente
        //   - Se banner ocupado com like e chega gift → interrompe e exibe gift
        //   - Se banner ocupado com gift e chega like → só atualiza o texto (não interrompe)
        //   - Se banner ocupado com mesmo tipo → só atualiza o texto
        //   - TTS roda paralelo (áudio apenas, sem banner)

        const filaAlertas = [];          // fila de pendentes
        let bannerAtivo   = false;       // true enquanto o banner estiver visível
        let tipoAtivo     = null;        // 'gift' | 'like' | null
        let timerBanner   = null;        // referência do setTimeout atual

        const DURACAO = { gift: 10000, like: 13000 };
        const CONFIG  = {
            gift: { src: '/static/EH_Nois.mp4', icone: '🎁', cor: '#ff9f43' },
            like: { src: '/static/DInovo.mp4',  icone: '❤️', cor: '#ff007f' },
        };

        function atualizarInfoFila() {
            const el = document.getElementById('banner-fila-info');
            if (filaAlertas.length > 0) {
                const gifts = filaAlertas.filter(a => a.tipo === 'gift').length;
                const likes = filaAlertas.filter(a => a.tipo === 'like').length;
                const partes = [];
                if (gifts) partes.push(`+${gifts} presente${gifts>1?'s':''}`);
                if (likes) partes.push(`+${likes} like${likes>1?'s':''}`);
                el.textContent = partes.length ? `Na fila: ${partes.join(' · ')}` : '';
            } else {
                el.textContent = '';
            }
        }

        function exibirBanner(tipo, mensagem) {
            const cfg   = CONFIG[tipo];
            const video = document.getElementById('meme-video');
            const banner = document.getElementById('banner-alerta');

            // Só recarrega o vídeo se o tipo mudou (evita piscar desnecessário)
            if (tipoAtivo !== tipo) {
                video.src = cfg.src;
                video.volume = volAlertas;
                video.load();
                video.play().catch(e => console.log('Vídeo alerta:', e));
            }

            document.getElementById('banner-icone').textContent = cfg.icone;
            document.getElementById('banner-texto').textContent  = mensagem;
            banner.style.display = 'block';
            bannerAtivo = true;
            tipoAtivo   = tipo;

            duckRadio(DURACAO[tipo]);

            // Reseta o timer sempre que exibir (novo presente reinicia contagem)
            if (timerBanner) clearTimeout(timerBanner);
            timerBanner = setTimeout(() => {
                fecharBanner();
            }, DURACAO[tipo]);

            atualizarInfoFila();
        }

        function fecharBanner() {
            document.getElementById('banner-alerta').style.display = 'none';
            document.getElementById('meme-video').pause();
            bannerAtivo = false;
            tipoAtivo   = null;
            timerBanner = null;
            atualizarInfoFila();
            // Processa próximo da fila se houver
            processarFila();
        }

        function processarFila() {
            if (filaAlertas.length === 0) return;
            // Ordena por prioridade (menor número = maior prioridade)
            filaAlertas.sort((a, b) => a.prioridade - b.prioridade);
            const proximo = filaAlertas.shift();
            exibirBanner(proximo.tipo, proximo.mensagem);
        }

        function enfileirarAlerta(tipo, mensagem) {
            const prioridade = tipo === 'gift' ? 1 : 2;

            if (!bannerAtivo) {
                // Banner livre → exibe direto
                exibirBanner(tipo, mensagem);
                return;
            }

            // Banner ocupado:
            if (tipo === 'gift' && tipoAtivo === 'like') {
                // Gift interrompe like → exibe imediatamente
                exibirBanner(tipo, mensagem);
                return;
            }

            if (tipo === tipoAtivo) {
                // Mesmo tipo → atualiza só o texto, reinicia timer
                document.getElementById('banner-texto').textContent = mensagem;
                // if (timerBanner) clearTimeout(timerBanner);
                // timerBanner = setTimeout(fecharBanner, DURACAO[tipo]);
                return;
            }

            // Caso contrário (like chegou enquanto gift toca) → enfileira
            filaAlertas.push({ tipo, mensagem, prioridade });
            atualizarInfoFila();
        }

        // ── ALERTAS TTS / PRESENTES / LIKES ──────────────────────
        // ID do último alerta processado por este cliente.
        // Cada aba/dispositivo tem o seu próprio — totalmente independentes.
        let ultimoAlertaId = -1;

        function processarAlerta(data) {
            if (data.tipo === "tts") {
                // TTS roda paralelo: só áudio, sem interferir no banner
                audioTTS.src = "/audio?" + Date.now();
                audioTTS.volume = volAlertas;
                duckRadio(8000);
                audioTTS.play();

            } else if (data.tipo === "gift") {
                enfileirarAlerta('gift', data.mensagem);
                if (data.nickname) {
                    atualizarDoadores(data.nickname, data.avatar_url || '');
                }

            } else if (data.tipo === "like") {
                enfileirarAlerta('like', data.mensagem);
            }
        }

        async function checarNovosAlertas() {
            try {
                // Envia o ultimo_id → servidor devolve só o que é mais novo
                const data = await (await fetch('/obter_alerta?ultimo_id=' + ultimoAlertaId)).json();
                if (!data.reproduzir) return;

                // Processa cada alerta na ordem de chegada
                for (const alerta of data.alertas) {
                    processarAlerta(alerta);
                    // Avança o ponteiro deste cliente
                    if (alerta.id > ultimoAlertaId) ultimoAlertaId = alerta.id;
                }
            } catch (err) {}
        }

        // ── INIT ──────────────────────────────────────────────────
        window.onload = () => {
            atualizarDebugViewport();
            iniciarCamera();
            setInterval(puxarDadosFirebase,   4000);
            setInterval(checarNovosAlertas,   1000);
        };
    </script>
</body>
</html>
