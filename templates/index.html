<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <!-- CHAVE: Travar o browser em portrait SEMPRE, independente do sensor -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Studio Domino - Overlay</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/static/manifest.json">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #000;
            color: #e1e1e6;
            overflow: hidden;
            /* Em portrait: width=altura-física, height=largura-física do celular deitado */
            width: 100vw;
            height: 100vh;
            position: relative;
        }

        /*
         * CÂMERA:
         * O celular está FISICAMENTE deitado (landscape), mas o browser está em portrait.
         * O stream da câmera chega em landscape (correto!).
         * Precisamos rotacionar o <video> 90° para ele ficar de pé visualmente,
         * e depois escalar para preencher a tela sem barras pretas.
         *
         * Matemática:
         *   - Em portrait: viewport = W x H (ex: 390 x 844)
         *   - Vídeo landscape: resolução = H x W (ex: 844 x 390 — câmera deitada)
         *   - Após rotate(90deg): o vídeo ocupa W x H visualmente... MAS o elemento
         *     ainda tem dimensões H x W no DOM, então precisamos transladar também.
         *   - A escala para preencher sem corte: scale = H / W (altura / largura do viewport)
         *     Isso estica o vídeo (que virou "estreito" após rotacionar) para encher a tela.
         */
        #webcam-fundo {
            position: absolute;
            /* Centraliza para a transformação girar em torno do centro da tela */
            top: 50%;
            left: 50%;
            /* Dimensões = tamanho do viewport em portrait */
            width: 100vw;
            height: 100vh;
            /* object-fit contain: sem corte, sem zoom artificial. A câmera já está landscape,
               o stream já tem a proporção certa. */
            object-fit: contain;
            background-color: #000;
            z-index: 1;
            /*
             * 1. translate(-50%,-50%): ancora o centro do vídeo no centro da tela
             * 2. rotate(90deg): gira o stream para ficar na orientação correta
             * 3. scaleY(var(--escala-video)): estica verticalmente (eixo Y após rotação
             *    = eixo X original) para preencher a largura da tela sem barras pretas
             *    Calculado via JS: window.innerHeight / window.innerWidth
             */
            transform: translate(-50%, -50%) rotate(90deg) scaleY(var(--escala-video, 1));
            transform-origin: center center;
        }

        /*
         * OVERLAY (placar + botões):
         * Tudo que está no overlay deve aparecer na orientação CORRETA para quem
         * olha o celular deitado. Então rotacionamos o container do overlay -90°
         * (sentido contrário) e ajustamos as dimensões para ele ocupar a tela inteira
         * na orientação landscape percebida.
         */
        #overlay-rotacionado {
            position: absolute;
            /* Centra para a rotação ocorrer ao redor do centro */
            top: 50%;
            left: 50%;
            /*
             * Após girar -90°, largura e altura trocam de lugar do ponto de vista do usuário.
             * Setamos width=100vh e height=100vw para o container "landscape" preencher tudo.
             */
            width: 100vh;
            height: 100vw;
            transform: translate(-50%, -50%) rotate(-90deg);
            transform-origin: center center;
            z-index: 50;
            /* Posicionamento interno como se fosse landscape */
            position: absolute;
        }

        /* --- MENU FLUTUANTE --- */
        .menu-container {
            position: absolute;
            top: 15px;
            right: 15px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 8px;
        }

        .botao-menu-principal {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(18, 18, 20, 0.9);
            border: 2px solid #00b37e;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .painel-controles {
            display: none;
            flex-direction: column;
            background: rgba(18, 18, 20, 0.95);
            backdrop-filter: blur(5px);
            padding: 10px;
            border-radius: 8px;
            gap: 8px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .painel-controles button {
            padding: 8px 14px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-align: left;
            white-space: nowrap;
        }

        /* --- PLACAR --- */
        .placar-container {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(18, 18, 20, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 10px;
            padding: 12px;
            width: 180px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.7);
            border-left: 5px solid #00b37e;
        }

        .placar-titulo {
            color: #00b37e;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 3px;
        }

        .jogador-item {
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            padding-bottom: 4px;
        }

        .jogador-item:last-child {
            border-bottom: none;
            margin-bottom: 0;
            padding-bottom: 0;
        }

        .jogador-linha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #ffffff;
        }

        .jogador-nome {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pontos-container {
            display: flex;
            gap: 4px;
        }

        .bloco-ponto {
            width: 14px;
            height: 10px;
            background-color: #2e2e35;
            transform: skewX(-15deg);
            border-radius: 1px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }

        .bloco-ponto.ativo {
            background-color: #ffca28;
            box-shadow: 0 0 8px rgba(255, 202, 40, 0.6);
        }

        .detalhes-jogo {
            font-size: 11px;
            color: #a8a8b3;
            margin-top: 2px;
        }

        /* --- ALERTAS --- */
        .caixa-alerta {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: rgba(0, 0, 0, 0.95);
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            z-index: 500;
            border: 3px solid #4834d4;
            box-shadow: 0 0 30px rgba(0,0,0,0.9);
        }

        .texto-alerta {
            font-size: 22px;
            color: #fff;
            margin-top: 10px;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }
    </style>
</head>
<body>

    <!-- CÂMERA: fora do overlay, rotacionada separadamente -->
    <video id="webcam-fundo" autoplay playsinline></video>

    <!-- TUDO do overlay dentro deste container que gira -90° -->
    <div id="overlay-rotacionado">

        <div class="menu-container">
            <button class="botao-menu-principal" onclick="alternarMenuControles()">⚙️</button>
            <div id="menu-paineis" class="painel-controles">
                <button onclick="alternarCamera()" style="background: #00b37e;">🎥 Alternar Câmera</button>
                <button onclick="ativarTelaCheia()" style="background: #ff9f43;">📺 Tela Cheia</button>
            </div>
        </div>

        <div class="placar-container">
            <div class="placar-titulo">📯 Placar da Partida</div>
            <div id="jogadores-lista">Carregando dados...</div>
        </div>

        <div id="alerta-presente" class="caixa-alerta">
            <video id="meme-video" width="320" playsinline>
                <source id="meme-src" src="" type="video/mp4">
            </video>
            <div id="meme-texto" class="texto-alerta"></div>
        </div>

        <div id="alerta-like" class="caixa-alerta">
            <video id="meme-like-video" width="320" playsinline>
                <source id="meme-like-src" src="" type="video/mp4">
            </video>
            <div id="meme-like-texto" class="texto-alerta"></div>
        </div>

    </div><!-- fim #overlay-rotacionado -->

    <script>
        let audioTTS = new Audio();
        let streamAtual = null;
        let posicaoCamera = "environment";

        // Calcula e aplica a escala correta para o vídeo preencher a tela sem barras pretas
        function calcularEscalaVideo() {
            // Em portrait: vw < vh. A câmera vem em landscape (proporção invertida).
            // Após rotate(90deg), o vídeo "estreito" (altura da tela) precisa se esticar
            // para cobrir a "largura" da tela. A escala necessária = altura / largura.
            const escala = window.innerHeight / window.innerWidth;
            document.documentElement.style.setProperty('--escala-video', escala);
        }

        async function iniciarCamera() {
            if (streamAtual) {
                streamAtual.getTracks().forEach(track => track.stop());
            }
            try {
                // Pedimos landscape explicitamente: a câmera traseira em modo landscape
                // já captura na proporção 16:9 ideal para este overlay
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: posicaoCamera,
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                streamAtual = stream;
                document.getElementById('webcam-fundo').srcObject = stream;
                // Recalcula a escala ao iniciar (garante que o CSS var está correto)
                calcularEscalaVideo();
            } catch (err) {
                console.error("Erro na webcam:", err);
                if (posicaoCamera === "environment") {
                    posicaoCamera = "user";
                    iniciarCamera();
                }
            }
        }

        function alternarMenuControles() {
            const painel = document.getElementById('menu-paineis');
            painel.style.display = painel.style.display === "flex" ? "none" : "flex";
        }

        function alternarCamera() {
            posicaoCamera = (posicaoCamera === "user") ? "environment" : "user";
            iniciarCamera();
        }

        function ativarTelaCheia() {
            const el = document.documentElement;
            if (!document.fullscreenElement) {
                (el.requestFullscreen || el.mozRequestFullScreen || el.webkitRequestFullscreen || el.msRequestFullscreen).call(el);
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
            }
            setTimeout(calcularEscalaVideo, 350);
        }

        // Recalcula se a janela mudar de tamanho (ex: barra do browser aparecer/sumir)
        window.addEventListener('resize', calcularEscalaVideo);

        function gerarBlocosPontos(pontos) {
            let html = '<div class="pontos-container">';
            const qtd = Math.min(Math.max(parseInt(pontos) || 0, 0), 4);
            for (let i = 1; i <= 4; i++) {
                html += `<div class="bloco-ponto ${i <= qtd ? 'ativo' : ''}"></div>`;
            }
            return html + '</div>';
        }

        async function puxarDadosFirebase() {
            try {
                const url = "https://firestore.googleapis.com/v1/projects/placar-domino/databases/(default)/documents/hardware/display";
                const response = await fetch(url);
                const data = await response.json();
                const campos = data.fields;
                let htmlGerado = "";
                for (let i = 1; i <= 4; i++) {
                    const nome = campos[`nome${i}`]?.stringValue || `Jogador ${i}`;
                    const points = parseInt(campos[`jogador${i}`]?.integerValue) || 0;
                    const lambretas = campos[`lambretas${i}`]?.integerValue || "0";
                    const raios = campos[`raios${i}`]?.integerValue || "0";
                    htmlGerado += `
                        <div class="jogador-item">
                            <div class="jogador-linha">
                                <span class="jogador-nome"><strong>${nome}</strong></span>
                                ${gerarBlocosPontos(points)}
                            </div>
                            <div class="detalhes-jogo">⚡ R: ${raios} | 🛵 L: ${lambretas}</div>
                        </div>`;
                }
                document.getElementById('jogadores-lista').innerHTML = htmlGerado;
            } catch (err) {
                console.error("Erro ao ler Firebase:", err);
            }
        }

        async function checarNovosAlertas() {
            try {
                const response = await fetch('/obter_alerta');
                const data = await response.json();
                if (data.reproduzir) {
                    if (data.tipo === "tts") {
                        audioTTS.src = "/audio?" + new Date().getTime();
                        audioTTS.play();
                    } else if (data.tipo === "gift") {
                        const box = document.getElementById('alerta-presente');
                        const video = document.getElementById('meme-video');
                        document.getElementById('meme-src').src = "/static/EH_Nois.mp4";
                        document.getElementById('meme-texto').innerText = data.mensagem;
                        box.style.borderColor = "#ff9f43";
                        box.style.display = "block";
                        video.load();
                        video.play().catch(e => console.log(e));
                        setTimeout(() => { box.style.display = "none"; video.pause(); }, 10000);
                    } else if (data.tipo === "like") {
                        const box = document.getElementById('alerta-like');
                        const video = document.getElementById('meme-like-video');
                        document.getElementById('meme-like-src').src = "/static/DInovo.mp4";
                        document.getElementById('meme-like-texto').innerText = data.mensagem;
                        box.style.borderColor = "#ff007f";
                        box.style.display = "block";
                        video.load();
                        video.play().catch(e => console.log(e));
                        setTimeout(() => { box.style.display = "none"; video.pause(); }, 13000);
                    }
                }
            } catch (err) {}
        }

        window.onload = () => {
            calcularEscalaVideo();
            iniciarCamera();
            setInterval(puxarDadosFirebase, 4000);
            setInterval(checarNovosAlertas, 1000);
        };
    </script>
</body>
</html>
