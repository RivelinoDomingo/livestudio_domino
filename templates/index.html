<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Live Studio Domino - Overlay</title>
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/static/manifest.json">

        <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #000;
            color: #e1e1e6;
            overflow: hidden;
            width: 100vw;
            height: 100vh;
        }

        /* =====================================================
           CÂMERA
        ===================================================== */
        #webcam-fundo {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            object-fit: cover;
            background: #000;
            z-index: 1;
        }

        /* =====================================================
           OVERLAY - SEM ROTAÇÃO
        ===================================================== */
        #overlay-rotacionado {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: none;
            z-index: 50;
        }

        /* --- MENU FLUTUANTE --- */
        .menu-container {
            position: absolute;
            top: 5px;
            right: 5px;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 4px;
        }

        .botao-menu-principal {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(18, 18, 20, 0.9);
            border: 2px solid #00b37e;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .painel-controles {
            display: none;
            flex-direction: column;
            background: rgba(18, 18, 20, 0.95);
            backdrop-filter: blur(5px);
            padding: 5px;
            border-radius: 8px;
            gap: 3px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.7);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .painel-controles button {
            padding: 8px 14px;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            font-size: 12px;
            text-align: left;
            white-space: nowrap;
        }

        /* --- PLACAR --- */
        .placar-container {
            position: absolute;
            top: 1px;
            left: 1px;
            background-color: rgba(18, 18, 20, 0.15);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            border-radius: 10px;
            padding: 5px;
            width: 160px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.7);
            border-left: 5px solid #00b37e;
        }

        .placar-titulo {
            color: #00b37e;
            font-size: 13px;
            font-weight: bold;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            padding-bottom: 3px;
        }
        .icone-placar {
            width: 22px;
            height: 22px;
            vertical-align: middle;
            margin-right: 8px;
        }

        .jogador-item {
            margin-bottom: 6px;
            border-bottom: 1px solid rgba(255,255,255,0.04);
            padding-bottom: 4px;
        }
        .jogador-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }

        .jogador-linha {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
        }

        .jogador-nome {
            max-width: 120px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .pontos-container { display: flex; gap: 4px; }

        .bloco-ponto {
            width: 14px;
            height: 10px;
            background-color: #2e2e35;
            transform: skewX(-15deg);
            border-radius: 1px;
            transition: background-color 0.3s ease, box-shadow 0.3s ease;
        }
        .bloco-ponto.ativo {
            background-color: #ffca28;
            box-shadow: 0 0 8px rgba(255,202,40,0.6);
        }

        .detalhes-jogo { font-size: 11px; color: #a8a8b3; margin-top: 2px; }

        /* --- ALERTAS --- */
        #banner-alerta {
            background: transparent;
        }

        /* --- MODAL RÁDIO --- */
        #modal-radio {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(18,18,20,0.97);
            border: 2px solid #00b37e;
            border-radius: 12px;
            padding: 18px;
            z-index: 600;
            min-width: 260px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.8);
        }
        #modal-radio h3 {
            color: #00b37e;
            font-size: 13px;
            margin-bottom: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        #modal-radio input[type=text] {
            width: 100%;
            padding: 8px 10px;
            background: #2e2e35;
            border: 1px solid #444;
            border-radius: 6px;
            color: #fff;
            font-size: 12px;
            margin-bottom: 10px;
            font-family: 'Courier New', monospace;
        }
        .radio-volume-row {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 10px;
            font-size: 11px;
            color: #a8a8b3;
        }
        .radio-volume-row input[type=range] {
            flex: 1;
            accent-color: #00b37e;
        }
        .modal-btns {
            display: flex;
            gap: 8px;
        }
        .modal-btns button {
            flex: 1;
            padding: 8px;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
            color: #fff;
        }

        /* --- PAINEL DE DEBUG --- */
        #debug-painel {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0,0,0,0.75);
            border: 1px solid #00ff88;
            border-radius: 6px;
            padding: 8px 10px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            color: #00ff88;
            line-height: 1.6;
            display: none;
            z-index: 200;
        }
        #debug-painel b { color: #fff; }

        /* =====================================================
           BANNER CLASSIFICAÇÃO — parte inferior da tela
        ===================================================== */
        #banner-classificacao {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            z-index: 100;
            display: flex;
            align-items: stretch;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
        }

        /* Metade esquerda e direita — trilha rolante */
        .banner-half {
            flex: 1;
            overflow: hidden;
            position: relative;
            background: linear-gradient(90deg, rgba(10,10,18,0.88), rgba(20,20,36,0.82));
            border-top: 1.5px solid rgba(0,179,126,0.45);
            display: flex;
            align-items: center;
        }
        .banner-half::before,
        .banner-half::after {
            content: '';
            position: absolute;
            top: 0; bottom: 0;
            width: 28px;
            z-index: 2;
            pointer-events: none;
        }
        #banner-left::before  { left: 0;  background: linear-gradient(to right, rgba(10,10,18,0.9), transparent); }
        #banner-left::after   { right: 0; background: linear-gradient(to left,  rgba(10,10,18,0.9), transparent); }
        #banner-right::before { left: 0;  background: linear-gradient(to right, rgba(10,10,18,0.9), transparent); }
        #banner-right::after  { right: 0; background: linear-gradient(to left,  rgba(10,10,18,0.9), transparent); }

        .banner-scroll-track {
            display: inline-flex;
            align-items: center;
            white-space: nowrap;
            animation: banner-scroll 45s linear infinite;
            will-change: transform;
        }
        .banner-scroll-track:hover { animation-play-state: paused; }

        /* Esquerda rola →←, direita rola ←→ para efeito espelhado */
        #banner-right .banner-scroll-track {
            animation-direction: reverse;
        }

        @keyframes banner-scroll {
            0%   { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Item individual */
        .bc-item {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 0 18px;
            border-right: 1px solid rgba(255,255,255,0.08);
            font-size: 11px;
            color: #c8d6e5;
            line-height: 1;
        }
        .bc-serie {
            font-size: 9px;
            font-weight: 700;
            padding: 1px 5px;
            border-radius: 3px;
            letter-spacing: 0.08em;
            text-transform: uppercase;
        }
        .bc-pos   { font-weight: 700; font-size: 11px; min-width: 18px; }
        .bc-name  { font-weight: 700; color: #fff; font-size: 12px; }
        .bc-stat  { color: #7f8c9a; font-size: 10px; }
        .bc-stat b { color: #b8c8d8; font-weight: 600; }

        /* Separador de série */
        .bc-divider {
            display: inline-flex;
            align-items: center;
            padding: 0 16px;
            gap: 5px;
            font-size: 9px;
            font-weight: 800;
            letter-spacing: 0.12em;
            border-right: 1.5px solid rgba(0,179,126,0.3);
        }

        /* Relógio central */
        #banner-clock {
            flex-shrink: 0;
            width: 80px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(0,0,0,0.7);
            border-top: 1.5px solid #00b37e;
            border-left:  1px solid rgba(0,179,126,0.3);
            border-right: 1px solid rgba(0,179,126,0.3);
            gap: 1px;
            position: relative;
            z-index: 5;
        }
        #clock-time {
            font-size: 17px;
            font-weight: 700;
            color: #00b37e;
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
            line-height: 1;
            font-family: 'Courier New', monospace;
        }
        #clock-date {
            font-size: 8px;
            color: #4a6070;
            letter-spacing: 0.06em;
            text-transform: uppercase;
        }
        #clock-label {
            font-size: 7px;
            color: #1a4030;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        /* --- LISTA DE DOADORES --- */
        #doadores-container {
            position: absolute;
            top: 218px;
            left: 5px;
            display: flex;
            flex-direction: column;
            gap: 1px;
            z-index: 101;
        }

        .doador-card {
            display: flex;
            align-items: center;
            gap: 7px;
            background: rgba(18, 18, 20, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 20px;
            padding: 4px 10px 4px 4px;
            border: 1px solid rgba(255, 179, 126, 0.3);
            box-shadow: 0 2px 8px rgba(0,0,0,0.5);
            animation: slideIn 0.3s ease;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateX(-12px); }
            to   { opacity: 1; transform: translateX(0); }
        }

        .doador-posicao {
            font-size: 10px;
            color: #ff9f43;
            font-weight: bold;
            min-width: 14px;
            text-align: center;
        }

        .doador-avatar {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid #ff9f43;
            background: #2e2e35;
            flex-shrink: 0;
        }

        .doador-avatar-fallback {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff9f43, #ff6b35);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            flex-shrink: 0;
            border: 1.5px solid #ff9f43;
        }

        .doador-nick {
            font-size: 11px;
            font-weight: bold;
            color: #fff;
            max-width: 90px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>

    <script>
        // Registra o Service Worker para cache dos arquivos /static
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('[SW] Registrado:', reg.scope))
                    .catch(err => console.warn('[SW] Falha no registro:', err));
            });
        }
    </script>
</head>
<body>

    <!-- CÂMERA: fora do overlay, sem nenhum tratamento -->
    <video id="webcam-fundo" autoplay playsinline></video>

    <!-- OVERLAY: todo o conteúdo visual rotacionado -90° -->
    <div id="overlay-rotacionado">

        <!-- Menu de controles -->
        <div class="menu-container">
            <button class="botao-menu-principal" onclick="alternarMenuControles()">⚙️</button>
            <div id="menu-paineis" class="painel-controles">
                <button onclick="alternarCamera()"   style="background:#00b37e;">🎥 Alternar Câmera</button>
                <button onclick="ativarTelaCheia()"  style="background:#ff9f43;">📺 Tela Cheia</button>
                <button onclick="abrirModalRadio()"  style="background:#7c3aed;">📻 Rádio Web</button>
                <button onclick="alternarDebug()"    style="background:#444;">🔍 Debug Info</button>
            </div>
        </div>

        <!-- Placar -->
        <div class="placar-container" id="placar-container">
            <div class="placar-titulo">
                <img src="/static/domino_logo.png" class="icone-placar">
            Placar
            </div>
            <div id="jogadores-lista">Carregando dados...</div>
        </div>

        <!-- Lista dos últimos doadores -->
        <div id="doadores-container"></div>

        <!-- Banner único de alertas (gift + like) com fila e prioridade -->
        <div id="banner-alerta" style="display:none; position:absolute; top:0; left:0; width:100%; height:100%; z-index:500; pointer-events:none;">
            <!-- Vídeo centralizado -->
            <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-55%); text-align:center;">
                <video id="meme-video" playsinline
                       style="max-width:84vh; max-height:52vw; border-radius:10px; display:block;"></video>
            </div>
            <!-- Texto ancorado na parte inferior -->
            <div id="banner-texto-container" style="
                position:absolute; bottom:18px; left:0; width:100%;
                text-align:center; padding:0 20px;">
                <!-- Tipo do alerta (ícone) -->
                <div id="banner-icone" style="font-size:20px; margin-bottom:4px;"></div>
                <!-- Mensagem principal (nome do doador) -->
                <div id="banner-texto" style="
                    font-size:20px; font-weight:bold; color:#fff;
                    text-shadow:2px 2px 6px rgba(0,0,0,0.9);
                    background:rgba(0,0,0,0.55); border-radius:8px;
                    padding:6px 14px; display:inline-block;
                    max-width:90%; word-break:break-word;"></div>
                <!-- Fila de próximos (aparece quando há mais de 1 pendente) -->
                <div id="banner-fila-info" style="
                    font-size:11px; color:#ccc; margin-top:4px;
                    opacity:0.8;"></div>
            </div>
        </div>

        <!-- Modal Rádio -->
        <div id="modal-radio">
            <h3>📻 Rádio Web</h3>
            <label style="font-size:11px;color:#a8a8b3;">Endereço do stream</label>
            <input type="text" id="radio-url-input" placeholder="http://192.168.1.x:8080/stream">

            <div class="radio-volume-row">
                <span>🎵 Rádio</span>
                <input type="range" id="vol-radio" min="0" max="1" step="0.05" value="0.7"
                       oninput="ajustarVolume('radio', this.value)">
                <span id="vol-radio-val">70%</span>
            </div>
            <div class="radio-volume-row">
                <span>🔊 Alertas</span>
                <input type="range" id="vol-alertas" min="0" max="1" step="0.05" value="1"
                       oninput="ajustarVolume('alertas', this.value)">
                <span id="vol-alertas-val">100%</span>
            </div>

            <div class="modal-btns">
                <button id="btn-ligar-radio" onclick="ligarRadio()"
                        style="background:#7c3aed;">▶ Ligar</button>
                <button onclick="fecharModalRadio()"
                        style="background:#444;">✕ Fechar</button>
            </div>
        </div>

        <!-- Painel de debug (oculto por padrão) -->
        <div id="debug-painel">
            <b>📷 DEBUG</b><br>
            Viewport: <span id="d-viewport">—</span><br>
            Stream: <span id="d-stream-res">—</span>  ratio: <span id="d-stream-ratio">—</span><br>
            video WxH: <span id="d-vid-w">—</span> x <span id="d-vid-h">—</span><br>
            Orientação: <span id="d-vid-orient">—</span><br>
            facingMode: <span id="d-facing">—</span><br>
            resizeMode: <span id="d-resize">—</span><br>
            screen.orient: <span id="d-screen-orient">—</span><br>
            DPR: <span id="d-dpr">—</span>
        </div>

        <!-- ── BANNER CLASSIFICAÇÃO ── -->
        <div id="banner-classificacao">

            <!-- Metade esquerda -->
            <div class="banner-half" id="banner-left">
                <div class="banner-scroll-track" id="scroll-left">
                    <span class="bc-item" style="color:#4a6070">⏳ carregando…</span>
                </div>
            </div>

            <!-- Relógio central -->
            <div id="banner-clock">
                <div id="clock-time">--:--</div>
                <div id="clock-date">---</div>
                <div id="clock-label">🔴 ao vivo</div>
            </div>

            <!-- Metade direita -->
            <div class="banner-half" id="banner-right">
                <div class="banner-scroll-track" id="scroll-right">
                    <span class="bc-item" style="color:#4a6070">⏳ carregando…</span>
                </div>
            </div>

        </div>

    </div><!-- fim #overlay-rotacionado -->

    <script>
        let audioTTS     = new Audio();
        let streamAtual  = null;
        let facingAtual  = "environment";
        let debugVisivel = false;

        // ── RÁDIO WEB ─────────────────────────────────────────────
        const audioRadio = new Audio();
        audioRadio.loop  = false; // stream contínuo, não precisa de loop
        let radioAtiva   = false;
        let volRadio     = 0.7;   // volume padrão da rádio
        let volAlertas   = 1.0;   // volume padrão dos alertas/TTS

        function abrirModalRadio() {
            // Fecha o menu de controles
            document.getElementById('menu-paineis').style.display = 'none';
            const modal = document.getElementById('modal-radio');
            // Pré-preenche com o valor salvo
            const salvo = localStorage.getItem('radio_url') || '';
            document.getElementById('radio-url-input').value = salvo;
            modal.style.display = 'block';
        }

        function fecharModalRadio() {
            document.getElementById('modal-radio').style.display = 'none';
        }

        function ligarRadio() {
            const input = document.getElementById('radio-url-input').value.trim();
            if (!input) return;

            // Salva para próxima vez
            localStorage.setItem('radio_url', input);

            if (radioAtiva) {
                // Desliga
                audioRadio.pause();
                audioRadio.src = '';
                radioAtiva = false;
                document.getElementById('btn-ligar-radio').textContent = '▶ Ligar';
                document.getElementById('btn-ligar-radio').style.background = '#7c3aed';
            } else {
                // Normaliza a URL: garante http:// e adiciona /stream se não tiver caminho
                let urlFinal = input.trim();
                if (!urlFinal.startsWith('http')) urlFinal = 'http://' + urlFinal;
                // Se a URL for só host:porta sem caminho, aponta para /stream
                try {
                    const u = new URL(urlFinal);
                    if (u.pathname === '/' || u.pathname === '') u.pathname = '/stream';
                    urlFinal = u.toString();
                } catch(e) {}
                const urlProxy = '/radio-proxy?url=' + encodeURIComponent(urlFinal);
                audioRadio.src = urlProxy;
                audioRadio.volume = volRadio;
                audioRadio.play().catch(e => console.warn('Rádio:', e));
                radioAtiva = true;
                document.getElementById('btn-ligar-radio').textContent = '⏹ Parar';
                document.getElementById('btn-ligar-radio').style.background = '#e53e3e';
            }
        }

        function ajustarVolume(alvo, valor) {
            const pct = Math.round(valor * 100) + '%';
            if (alvo === 'radio') {
                volRadio = parseFloat(valor);
                audioRadio.volume = volRadio;
                document.getElementById('vol-radio-val').textContent = pct;
            } else {
                volAlertas = parseFloat(valor);
                audioTTS.volume = volAlertas;
                document.getElementById('vol-alertas-val').textContent = pct;
            }
        }

        // Aplica ducking na rádio durante alertas e restaura depois
        function duckRadio(duracao) {
            if (!radioAtiva) return;
            const volOriginal = volRadio;
            audioRadio.volume = Math.min(volOriginal * 0.15, 0.1); // abaixa para ~15%
            setTimeout(() => {
                if (radioAtiva) audioRadio.volume = volOriginal;
            }, duracao);
        }

        // ── CÂMERA ────────────────────────────────────────────────
        // Pede alta resolução MAS com a proporção exata do viewport
        // para evitar que o Firefox precise fazer crop-and-scale.
        // Viewport portrait ≈ 9:16 → câmera landscape → 16:9
        // Calculamos o aspectRatio real do viewport em landscape (W/H invertido)
        // e passamos como constraint; assim o stream chega já na proporção certa.
        async function iniciarCamera() {
            if (streamAtual) streamAtual.getTracks().forEach(t => t.stop());

            // Configurações de estilo para cada orientação
            const estilos = {
                landscape: {  // paisagem (celular deitado)
                    transform: 'translate(-50%, -50%) rotate(-90deg)',
                    width: '100vh',
                    height: '100vw',
                    objectFit: 'cover',
                    position: 'absolute',
                    top: '50%',
                    left: '50%',
                    transformOrigin: 'center center'
                },
                portrait: {   // retrato (celular em pé)
                    transform: 'translate(-50%, -50%) rotate(0deg)',
                    width: '100%',
                    height: '100%',
                    objectFit: 'cover',
                    position: 'absolute',
                    top: '50%',
                    left: '50%',
                    transformOrigin: 'center center'
                }
            };

            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: {
                        facingMode: facingAtual,
                        width: { ideal: 2440 },
                        height: { ideal: 720 }
                    },
                    audio: false
                });
                streamAtual = stream;

                const videoEl = document.getElementById('webcam-fundo');
                videoEl.srcObject = stream;

                function aplicarEstiloCamera() {
                    const tipo = window.innerWidth > window.innerHeight ? 'landscape' : 'portrait';
                    const estilo = estilos[tipo];

                    Object.assign(videoEl.style, estilo);
                    console.log(`📱 Orientação: ${tipo} | Ajuste aplicado`);
                }

                aplicarEstiloCamera();

                // Reaplica quando a tela girar
                const observer = new ResizeObserver(() => aplicarEstiloCamera());
                observer.observe(document.body);

                const track = stream.getVideoTracks()[0];
                const settings = track.getSettings();
                document.getElementById('d-stream-res').textContent =
                    `${settings.width || '?'} x ${settings.height || '?'}`;
                document.getElementById('d-stream-ratio').textContent =
                    settings.aspectRatio ? settings.aspectRatio.toFixed(3) : '?';
                document.getElementById('d-facing').textContent =
                    settings.facingMode || '?';
                document.getElementById('d-resize').textContent =
                    settings.resizeMode || 'n/a';

                videoEl.onloadedmetadata = atualizarDebugVideo;

            } catch (err) {
                console.error("Erro na câmera:", err);
                if (facingAtual === "environment") {
                    facingAtual = "user";
                    iniciarCamera();
                }
            }
        }

        // ── CONTROLES ─────────────────────────────────────────────
        function alternarMenuControles() {
            const p = document.getElementById('menu-paineis');
            const q = document.getElementById('debug-painel');
            p.style.display = p.style.display === "flex" ? "none" : "flex";
            if (p.style.display === "none" && q.style.display === "block") {
                debugVisivel = !debugVisivel;
                document.getElementById('debug-painel').style.display = "none";
            }

        }

        function alternarCamera() {
            facingAtual = facingAtual === "user" ? "environment" : "user";
            iniciarCamera();
        }

        function ativarTelaCheia() {
            const el = document.documentElement;
            if (!document.fullscreenElement) {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
                const fn = el.requestFullscreen || el.mozRequestFullScreen ||
                        el.webkitRequestFullscreen || el.msRequestFullscreen;
                if (fn) {
                    fn.call(el).catch(err => console.warn('Fullscreen:', err));
                }
            } else {
                (document.exitFullscreen || document.webkitExitFullscreen).call(document);
                if (screen.orientation && screen.orientation.unlock) {
                    screen.orientation.unlock();
                }
            }
        }

        // Garante que ao entrar em fullscreen a orientação landscape seja travada.
        // O evento 'fullscreenchange' dispara depois que o fullscreen é concedido,
        // que é o momento certo para o lock funcionar no Android com overlay ativo.
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                if (screen.orientation && screen.orientation.lock) {
                    screen.orientation.lock('landscape').catch(() => {});
                }
            }
        });

        function alternarDebug() {
            debugVisivel = !debugVisivel;
            document.getElementById('debug-painel').style.display =
                debugVisivel ? "block" : "none";
        }

        // ── DEBUG ─────────────────────────────────────────────────
        function atualizarDebugVideo() {
            const vid = document.getElementById('webcam-fundo');
            const vw = vid.videoWidth, vh = vid.videoHeight;
            document.getElementById('d-vid-w').textContent = vw || '…';
            document.getElementById('d-vid-h').textContent = vh || '…';
            if (vw && vh) {
                const r = (vw / vh).toFixed(3);
                document.getElementById('d-vid-orient').textContent =
                    vw > vh ? `LANDSCAPE (${r})` : `PORTRAIT (${r})`;
            }
        }

        function atualizarDebugViewport() {
            document.getElementById('d-viewport').textContent =
                `${window.innerWidth} x ${window.innerHeight}`;
            document.getElementById('d-screen-orient').textContent =
                screen.orientation?.type || '?';
            document.getElementById('d-dpr').textContent =
                window.devicePixelRatio.toFixed(2);
        }

        setInterval(() => {
            if (debugVisivel) {
                atualizarDebugViewport();
                atualizarDebugVideo();
            }
        }, 1000);

        // ── LISTA DE DOADORES ─────────────────────────────────────
        // Guarda até 3 doadores: [{ nickname, avatar_url }]
        // 1° = mais recente (topo), 3° = mais antigo (base)
        const listaDoadores = [];

        function atualizarDoadores(nickname, avatar_url) {
            // Remove se já existia (vai para o topo)
            const idx = listaDoadores.findIndex(d => d.nickname === nickname);
            if (idx !== -1) listaDoadores.splice(idx, 1);

            // Insere no início (1° lugar = mais recente)
            listaDoadores.unshift({ nickname, avatar_url });

            // Mantém apenas os 3 últimos
            if (listaDoadores.length > 3) listaDoadores.pop();

            renderizarDoadores();
        }

        function renderizarDoadores() {
            const container = document.getElementById('doadores-container');
            // console.log('[DOADORES] renderizando', listaDoadores.length, 'itens | container:', !!container);
            if (!container) return;
            const posEmoji = ['🥇', '🥈', '🥉'];

            container.innerHTML = listaDoadores.map((d, i) => {
                const avatarHtml = d.avatar_url
                    ? `<img class="doador-avatar"
                            src="${d.avatar_url}"
                            alt="${d.nickname}"
                            onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                       <div class="doador-avatar-fallback" style="display:none;">🎁</div>`
                    : `<div class="doador-avatar-fallback">🎁</div>`;

                return `
                    <div class="doador-card">
                        <span class="doador-posicao">${posEmoji[i]}</span>
                        ${avatarHtml}
                        <span class="doador-nick">${d.nickname}</span>
                    </div>`;
            }).join('');
        }

        // ── PLACAR (FIREBASE) ─────────────────────────────────────
        function gerarBlocosPontos(pontos) {
            const qtd = Math.min(Math.max(parseInt(pontos) || 0, 0), 4);
            let html = '<div class="pontos-container">';
            for (let i = 1; i <= 4; i++)
                html += `<div class="bloco-ponto ${i <= qtd ? 'ativo' : ''}"></div>`;
            return html + '</div>';
        }

        async function puxarDadosFirebase() {
            try {
                const url = "https://firestore.googleapis.com/v1/projects/placar-domino/databases/(default)/documents/hardware/display";
                const data = await (await fetch(url)).json();
                const campos = data.fields;
                let html = "";
                for (let i = 1; i <= 4; i++) {
                    const nome     = campos[`nome${i}`]?.stringValue    || `Jogador ${i}`;
                    const points   = parseInt(campos[`jogador${i}`]?.integerValue) || 0;
                    const lambretas = campos[`lambretas${i}`]?.integerValue || "0";
                    const raios    = campos[`raios${i}`]?.integerValue    || "0";
                    html += `
                        <div class="jogador-item">
                            <div class="jogador-linha">
                                <span class="jogador-nome"><strong>${nome}</strong></span>
                                ${gerarBlocosPontos(points)}
                            </div>
                            <div class="detalhes-jogo">⚡ R: ${raios} | 🛵 L: ${lambretas}</div>
                        </div>`;
                }
                document.getElementById('jogadores-lista').innerHTML = html;
            } catch (err) { console.error("Erro Firebase:", err); }
        }

        // ── FILA DE ALERTAS COM PRIORIDADE ──────────────────────
        //
        // Estrutura de cada item: { tipo, mensagem, prioridade }
        //   prioridade 1 = gift (máxima)
        //   prioridade 2 = like
        //
        // Comportamento:
        //   - Se banner estiver livre → exibe imediatamente
        //   - Se banner ocupado com like e chega gift → interrompe e exibe gift
        //   - Se banner ocupado com gift e chega like → só atualiza o texto (não interrompe)
        //   - Se banner ocupado com mesmo tipo → só atualiza o texto
        //   - TTS roda paralelo (áudio apenas, sem banner)

        const filaAlertas = [];          // fila de pendentes
        let bannerAtivo   = false;       // true enquanto o banner estiver visível
        let tipoAtivo     = null;        // 'gift' | 'like' | null
        let timerBanner   = null;        // referência do setTimeout atual
        let timerFim      = 0;           // timestamp (ms) em que o banner vai fechar

        const DURACAO = { gift: 10000, like: 13000 };
        const CONFIG  = {
            gift: { src: '/static/EH_Nois.mp4', icone: '🎁', cor: '#ff9f43' },
            like: { src: '/static/DInovo.mp4',  icone: '❤️', cor: '#ff007f' },
        };

        function atualizarInfoFila() {
            const el = document.getElementById('banner-fila-info');
            if (filaAlertas.length > 0) {
                const gifts = filaAlertas.filter(a => a.tipo === 'gift').length;
                const likes = filaAlertas.filter(a => a.tipo === 'like').length;
                const partes = [];
                if (gifts) partes.push(`+${gifts} presente${gifts>1?'s':''}`);
                if (likes) partes.push(`+${likes} like${likes>1?'s':''}`);
                el.textContent = partes.length ? `Na fila: ${partes.join(' · ')}` : '';
            } else {
                el.textContent = '';
            }
        }

        function exibirBanner(tipo, mensagem) {
            const cfg   = CONFIG[tipo];
            const video = document.getElementById('meme-video');
            const banner = document.getElementById('banner-alerta');

            // Só recarrega o vídeo se o tipo mudou (evita piscar desnecessário)
            if (tipoAtivo !== tipo) {
                video.src = cfg.src;
                video.volume = volAlertas;
                video.load();
                video.play().catch(e => console.log('Vídeo alerta:', e));
            }

            document.getElementById('banner-icone').textContent = cfg.icone;
            document.getElementById('banner-texto').textContent  = mensagem;
            banner.style.display = 'block';
            bannerAtivo = true;
            tipoAtivo   = tipo;

            duckRadio(DURACAO[tipo]);

            // Reseta o timer sempre que exibir (novo presente reinicia contagem)
            if (timerBanner) clearTimeout(timerBanner);
            timerBanner = setTimeout(() => {
                fecharBanner();
            }, DURACAO[tipo]);
            timerFim = Date.now() + DURACAO[tipo];

            atualizarInfoFila();
        }

        function fecharBanner() {
            document.getElementById('banner-alerta').style.display = 'none';
            document.getElementById('meme-video').pause();
            bannerAtivo = false;
            tipoAtivo   = null;
            timerBanner = null;
            atualizarInfoFila();
            // Processa próximo da fila se houver
            processarFila();
        }

        function processarFila() {
            if (filaAlertas.length === 0) return;
            // Ordena por prioridade (menor número = maior prioridade)
            filaAlertas.sort((a, b) => a.prioridade - b.prioridade);
            const proximo = filaAlertas.shift();
            exibirBanner(proximo.tipo, proximo.mensagem);
        }

        function enfileirarAlerta(tipo, mensagem) {
            const prioridade = tipo === 'gift' ? 1 : 2;

            if (!bannerAtivo) {
                // Banner livre → exibe direto
                exibirBanner(tipo, mensagem);
                return;
            }

            // Banner ocupado:
            if (tipo === 'gift' && tipoAtivo === 'like') {
                // Gift interrompe like → exibe imediatamente
                exibirBanner(tipo, mensagem);
                return;
            }

            if (tipo === tipoAtivo) {
                // Mesmo tipo → atualiza o texto e garante mínimo de 3s de exibição.
                // Se o timer restante for maior que 3s, mantém; se for menor, estica para 3s.
                document.getElementById('banner-texto').textContent = mensagem;
                const MINIMO_MS = 3000;
                const tempoRestante = timerBanner ? (timerFim - Date.now()) : 0;
                if (tempoRestante < MINIMO_MS) {
                    if (timerBanner) clearTimeout(timerBanner);
                    timerBanner = setTimeout(fecharBanner, MINIMO_MS);
                    timerFim = Date.now() + MINIMO_MS;
                }
                return;
            }

            // Caso contrário (like chegou enquanto gift toca) → enfileira
            filaAlertas.push({ tipo, mensagem, prioridade });
            atualizarInfoFila();
        }

        // ── ALERTAS TTS / PRESENTES / LIKES ──────────────────────
        // ID do último alerta processado por este cliente.
        // Cada aba/dispositivo tem o seu próprio — totalmente independentes.
        let ultimoAlertaId = -1;

        function processarAlerta(data) {
            if (data.tipo === "tts") {
                // TTS roda paralelo: só áudio, sem interferir no banner
                audioTTS.src = "/audio?" + Date.now();
                audioTTS.volume = volAlertas;
                duckRadio(8000);
                audioTTS.play();

            } else if (data.tipo === "gift") {
                enfileirarAlerta('gift', data.mensagem);
                if (data.nickname) {
                    atualizarDoadores(data.nickname, data.avatar_url || '');
                }

            } else if (data.tipo === "like") {
                enfileirarAlerta('like', data.mensagem);
            }
        }

        async function checarNovosAlertas() {
            try {
                // Envia o ultimo_id → servidor devolve só o que é mais novo
                const data = await (await fetch('/obter_alerta?ultimo_id=' + ultimoAlertaId)).json();
                if (!data.reproduzir) return;

                // Processa cada alerta na ordem de chegada
                for (const alerta of data.alertas) {
                    processarAlerta(alerta);
                    // Avança o ponteiro deste cliente
                    if (alerta.id > ultimoAlertaId) ultimoAlertaId = alerta.id;
                }
            } catch (err) {}
        }

        // ── RELÓGIO ───────────────────────────────────────────────
        function tickClock() {
            const now  = new Date();
            const hh   = String(now.getHours()).padStart(2,'0');
            const mm   = String(now.getMinutes()).padStart(2,'0');
            const ss   = String(now.getSeconds()).padStart(2,'0');
            const dias = ['DOM','SEG','TER','QUA','QUI','SEX','SÁB'];
            const dd   = String(now.getDate()).padStart(2,'0');
            const mo   = String(now.getMonth()+1).padStart(2,'0');
            document.getElementById('clock-time').textContent = `${hh}:${mm}:${ss}`;
            document.getElementById('clock-date').textContent =
                `${dias[now.getDay()]} ${dd}/${mo}`;
        }
        tickClock();
        setInterval(tickClock, 1000);

        // ── BANNER CLASSIFICAÇÃO (Firebase REST — sem SDK) ────────
        (async function initBannerClassificacao() {

            const PROJECT   = "placar-domino";
            const APP_ID    = "1:187178310074:web:5f56292dea8dc776532583";
            const BASE_PATH = `artifacts/${APP_ID}/public/data/players`;
            const API_BASE  = `https://firestore.googleapis.com/v1/projects/${PROJECT}/databases/(default)/documents`;

            const SERIE_ORDER  = ['A','B','C','D','Amador'];
            const SERIE_COLOR  = { A:'#ef4444', B:'#f97316', C:'#22c55e', D:'#3b82f6', Amador:'#a855f7' };
            const POS_EMOJI    = { 1:'🥇', 2:'🥈', 3:'🥉' };

            // Detecta temporada mais alta (ex: "temporada_10" → 10)
            function detectarTemporadaAtual(docs) {
                let max = 0;
                for (const doc of docs) {
                    const fields = doc.fields || {};
                    for (const key of Object.keys(fields)) {
                        if (key.startsWith('temporada_')) {
                            const n = parseInt(key.replace('temporada_',''), 10);
                            if (!isNaN(n) && n > max) max = n;
                        }
                    }
                }
                return `temporada_${max}`;
            }

            // Lê valor de um campo Firestore (int ou double ou string)
            function fv(field) {
                if (!field) return 0;
                if (field.integerValue !== undefined) return Number(field.integerValue);
                if (field.doubleValue  !== undefined) return Number(field.doubleValue);
                if (field.stringValue  !== undefined) return field.stringValue;
                return 0;
            }

            async function fetchClassificacao() {
                // Firestore REST list — pageSize máx 300 para pegar todos de uma vez
                const url = `${API_BASE}/${BASE_PATH}?pageSize=300`;
                const res  = await fetch(url);
                const json = await res.json();
                const docs = json.documents || [];

                if (!docs.length) return {};

                const temporada = detectarTemporadaAtual(docs);
                const ligas     = {};

                for (const doc of docs) {
                    const f      = doc.fields || {};
                    const stats  = f[temporada]?.mapValue?.fields || {};
                    const partiadas = fv(stats.partidasNaTemporada);
                    if (!partiadas) continue; // sem jogos na temporada atual

                    const serie = fv(f.series) || fv(f.serie) || 'D';

                    if (!ligas[serie]) ligas[serie] = [];
                    ligas[serie].push({
                        name:          fv(f.name) || '—',
                        series:        String(serie),
                        aproveitamento: Number(fv(stats.aproveitamentoNaTemporada)) || 0,
                        pontos:         Number(fv(stats.pontosNaTemporada))         || 0,
                        lambretas:      Number(fv(stats.lambretasNaTemporada))      || 0,
                        raios:          Number(fv(stats.raiosNaTemporada))          || 0,
                        partidas:       Number(partiadas),
                    });
                }

                // Ordena cada série: aproveitamento → pontos → menos lambretas
                for (const s of Object.keys(ligas)) {
                    ligas[s].sort((a,b) => {
                        const d1 = b.aproveitamento - a.aproveitamento;
                        if (d1 !== 0) return d1;
                        const d2 = b.pontos - a.pontos;
                        if (d2 !== 0) return d2;
                        return a.lambretas - b.lambretas;
                    });
                }

                return ligas;
            }

            function buildItems(ligas) {
                const items = [];
                for (const serie of SERIE_ORDER) {
                    const players = ligas[serie];
                    if (!players || !players.length) continue;
                    const cor = SERIE_COLOR[serie] || '#3b82f6';

                    // separador de série
                    items.push(
                        `<span class="bc-divider" style="color:${cor};border-right-color:${cor}44">
                            ◆ SÉRIE ${serie}
                        </span>`
                    );

                    players.forEach((p, i) => {
                        const pos   = i + 1;
                        // const emoji = POS_EMOJI[pos] || `${pos}º`;
                        const pos_f = `${pos}º`
                        const aprov = p.aproveitamento.toFixed(1);
                        items.push(
                            `<span class="bc-item">
                                <span class="bc-serie" style="background:${cor}22;color:${cor};border:1px solid ${cor}44">${serie}</span>
                                <span class="bc-pos" style="color:${cor}">${pos_f}</span>
                                <span class="bc-name">${p.name}</span>
                                <span class="bc-stat"><b>${aprov}%</b> · ⚡<b>${p.raios}</b> · 🛵<b>${p.lambretas}</b></span>
                            </span>`
                        );
                    });
                }
                return items;
            }

            function renderBanner(ligas) {
                const items = buildItems(ligas);
                if (!items.length) return;

                // Divide ao meio: primeira metade → left, segunda → right
                const meio    = Math.ceil(items.length / 2);
                const esq     = items.slice(0, meio);
                const dir     = items.slice(meio);

                // Duplica cada metade para loop suave contínuo
                const htmlEsq = esq.join('') + esq.join('');
                const htmlDir = dir.length ? dir.join('') + dir.join('')
                                           : esq.join('') + esq.join(''); // fallback: repete esquerda

                document.getElementById('scroll-left').innerHTML  = htmlEsq;
                document.getElementById('scroll-right').innerHTML = htmlDir;

                // Ajusta velocidade por tamanho do conteúdo
                const totalPlayers = Object.values(ligas).flat().length;
                const dur = Math.max(35, totalPlayers * 5);
                document.querySelectorAll('.banner-scroll-track').forEach(el => {
                    el.style.animationDuration = dur + 's';
                });
            }

            async function atualizar() {
                try {
                    const ligas = await fetchClassificacao();
                    renderBanner(ligas);
                } catch(e) {
                    console.warn('[banner-classificacao] erro:', e);
                }
            }

            atualizar();
            setInterval(atualizar, 5 * 60 * 1000); // atualiza a cada 5 min
        })();

        // ── INIT ──────────────────────────────────────────────────
        window.onload = () => {
            atualizarDebugViewport();
            iniciarCamera();
            setInterval(puxarDadosFirebase,   4000);
            setInterval(checarNovosAlertas,   1000);
        };
    </script>
